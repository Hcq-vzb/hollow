<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KIWL Machinery - Professional Hollow Blow Molding Machine Manufacturer</title><meta name="description" content="Leading manufacturer of hollow blow molding machines with 20+ years of experience. High-quality plastic manufacturing solutions for global industries."><link rel="alternate" hreflang="en" href="https://hollowblowmolders.com/"/><link rel="alternate" hreflang="ar" href="https://hollowblowmolders.com/?lang=ar"/><link rel="alternate" hreflang="x-default" href="https://hollowblowmolders.com/"/><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>/* 内联样式确保主题色立即生效，避免闪烁 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    html.light, html.light body {
      background-color: #ffffff !important;
      color: #000000;
    }
    html.dark, html.dark body {
      background-color: #1a1a1a !important;
      color: #ffffff;
    }</style><script>// 在 React 加载前立即设置主题和语言，避免闪烁
    (function() {
      const isInIframe = window.self !== window.top;
      const savedLang = localStorage.getItem('language');
      const isArabic = savedLang === 'ar';

      function applyThemeToDOM(theme) {
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
        document.documentElement.setAttribute('data-theme', theme);
      }

      function applyLanguageToDOM(lang) {
        document.documentElement.lang = lang;
        if (lang === 'ar') {
          document.documentElement.setAttribute('dir', 'rtl');
          document.documentElement.classList.add('rtl');
        } else {
          document.documentElement.setAttribute('dir', 'ltr');
          document.documentElement.classList.remove('rtl');
        }
      }

      // Apply initial language
      applyLanguageToDOM(isArabic ? 'ar' : 'en');

      if (isInIframe) {
        // 监听父窗口主动推送的主题消息
        window.addEventListener('message', function(event) {
          if (event.data && typeof event.data.theme === 'string') {
            const theme = event.data.theme;
            if (theme === 'light' || theme === 'dark') {
              applyThemeToDOM(theme);
            }
          }
        });
      } else {
        // 非 iframe 环境，使用默认 light 主题
        applyThemeToDOM('light');
      }
    })();</script></head><body><div id="root"></div><script defer="defer" src="bundle.js"></script></body></html>
